<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories — Bhavya Agro Exports Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>BA</h1>
      <p>Admin</p>
    </div>
    
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="adminName">Omkar Gadghile</div>
      <div class="sidebar-user-role">Administrator</div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-nav-item">
        <i data-lucide="layout-dashboard"></i>
        Dashboard
      </a>
      <a href="products.html" class="sidebar-nav-item">
        <i data-lucide="package"></i>
        Products
      </a>
      <a href="enquiries.html" class="sidebar-nav-item">
        <i data-lucide="mail"></i>
        Enquiries
        <span class="sidebar-nav-badge" id="enquiryBadge">0</span>
      </a>
      <a href="categories.html" class="sidebar-nav-item">
        <i data-lucide="layout-grid"></i>
        Categories
      </a>
      <a href="certificates.html" class="sidebar-nav-item">
        <i data-lucide="badge-check"></i>
        Certifications
      </a>
      <a href="settings.html" class="sidebar-nav-item">
        <i data-lucide="settings"></i>
        Settings
      </a>
    </nav>
    
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank" class="sidebar-nav-item">
        <i data-lucide="external-link"></i>
        View Website
      </a>
      <a href="#" onclick="logout()" class="sidebar-nav-item">
        <i data-lucide="log-out"></i>
        Logout
      </a>
    </div>
  </aside>
  
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">Categories</div>
    
    <div class="topbar-actions">
      <div class="topbar-search">
        <i data-lucide="search" class="topbar-search-icon"></i>
        <input type="text" placeholder="Search categories..." id="categorySearch">
      </div>
      
      <div style="position: relative;">
        <i data-lucide="bell" style="cursor: pointer; color: var(--light-text);"></i>
        <span class="sidebar-nav-badge" style="position: absolute; top: -8px; right: -8px;" id="notificationBadge">0</span>
      </div>
      
      <div class="topbar-avatar">BK</div>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main-content">
    <div class="content-area">
      <div class="page-header">
        <div class="section-label">Organization</div>
        <h1 class="page-title">Categories</h1>
      </div>
      
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left"></div>
        
        <div class="toolbar-right">
          <button class="btn btn-primary" onclick="openCategoryModal()">
            <i data-lucide="plus"></i>
            Add Category
          </button>
        </div>
      </div>
      
      <!-- Categories Grid -->
      <div id="categoriesGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </main>
  
  <!-- Category Modal -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal-panel" style="max-width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="categoryModalTitle">Add Category</h3>
        <button class="modal-close" onclick="closeCategoryModal()">
          <i data-lucide="x"></i>
        </button>
      </div>
      
      <form id="categoryForm">
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Category Name <span style="color: var(--clay);">*</span>
          </label>
          <input type="text" id="categoryName" name="name" required>
          <span class="error-label" id="nameError"></span>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Slug
          </label>
          <input type="text" id="categorySlug" name="slug" placeholder="auto-generated">
          <span style="font-size: 11px; color: var(--light-text); margin-top: 4px; display: block;">
            URL-friendly version of the name (kebab-case)
          </span>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Description
          </label>
          <textarea id="categoryDescription" name="description" rows="3"></textarea>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Image URL
          </label>
          <input type="url" id="categoryImageUrl" name="imageUrl">
          <div style="margin-top: 8px;">
            <img id="categoryImagePreview" src="" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px; display: none;">
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Display Order
          </label>
          <input type="number" id="categoryOrder" name="order" min="1" placeholder="1, 2, 3...">
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 12px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Status
          </label>
          <div class="toggle-switch active" id="categoryStatusToggle" onclick="toggleSwitch(this)">
          </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--sand);">
          <button type="button" class="btn btn-outline" onclick="closeCategoryModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Category</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    let currentCategoryId = null;
    
    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      
      loadCategories();
      setupEventListeners();
      updateBadges();
    });
    
    function setupEventListeners() {
      // Category form
      document.getElementById('categoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveCategory();
      });
      
      // Auto-generate slug from name
      document.getElementById('categoryName').addEventListener('input', function() {
        const slug = this.value.toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .trim('-');
        document.getElementById('categorySlug').value = slug;
      });
      
      // Image preview
      document.getElementById('categoryImageUrl').addEventListener('blur', function() {
        const preview = document.getElementById('categoryImagePreview');
        if (this.value) {
          preview.src = this.value;
          preview.style.display = 'block';
        } else {
          preview.style.display = 'none';
        }
      });
      
      // Search
      document.getElementById('categorySearch').addEventListener('input', function() {
        loadCategories(this.value);
      });
    }
    
    function loadCategories(searchQuery = '') {
      const categories = BA.getAll('ba_categories');
      const products = BA.getAll('ba_products');
      
      const filtered = categories.filter(category => {
        const matchesSearch = !searchQuery || 
          category.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          category.description.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesSearch;
      });
      
      // Sort by order
      filtered.sort((a, b) => a.order - b.order);
      
      const grid = document.getElementById('categoriesGrid');
      
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 48px;">
            <div class="empty-state">
              <i data-lucide="layout-grid"></i>
              <h3>No categories yet</h3>
              <p>Add your first category to organize products</p>
              <button class="btn btn-primary" onclick="openCategoryModal()">
                <i data-lucide="plus"></i>
                Add Category
              </button>
            </div>
          </div>
        `;
      } else {
        grid.innerHTML = filtered.map(category => {
          const productCount = products.filter(p => p.category === category.name).length;
          const imageUrl = category.imageUrl || `https://images.unsplash.com/photo-${Math.floor(Math.random() * 1000000)}?w=400&h=300&fit=crop`;
          
          return `
            <div class="card">
              <div style="height: 160px; overflow: hidden; border-radius: 4px 4px 0 0;">
                <img src="${imageUrl}" style="width: 100%; height: 100%; object-fit: cover;">
              </div>
              <div style="padding: 20px;">
                <h3 style="font-size: 22px; margin-bottom: 8px;">${category.name}</h3>
                <p style="color: var(--light-text); font-size: 13px; margin-bottom: 16px;">${category.description}</p>
                
                <div style="margin-bottom: 16px;">
                  <span class="badge badge-sand">${productCount} Products</span>
                  <span class="badge ${category.active ? 'badge-sage' : 'badge-sand'}" style="margin-left: 8px;">
                    ${category.active ? 'Active' : 'Inactive'}
                  </span>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: space-between;">
                  <div class="toggle-switch ${category.active ? 'active' : ''}" onclick="toggleCategoryStatus(${category.id})"></div>
                  <div style="display: flex; gap: 8px;">
                    <button class="btn btn-sm btn-outline" onclick="editCategory(${category.id})">
                      <i data-lucide="edit-2"></i>
                    </button>
                    <button class="btn btn-sm btn-outline" style="color: var(--clay); border-color: var(--clay);" onclick="deleteCategory(${category.id})">
                      <i data-lucide="trash-2"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
      
      lucide.createIcons();
    }
    
    function openCategoryModal(categoryId = null) {
      currentCategoryId = categoryId;
      const modal = document.getElementById('categoryModal');
      const title = document.getElementById('categoryModalTitle');
      
      if (categoryId) {
        title.textContent = 'Edit Category';
        const category = BA.getAll('ba_categories').find(c => c.id === categoryId);
        if (category) {
          document.getElementById('categoryName').value = category.name;
          document.getElementById('categorySlug').value = category.slug;
          document.getElementById('categoryDescription').value = category.description || '';
          document.getElementById('categoryImageUrl').value = category.imageUrl || '';
          document.getElementById('categoryOrder').value = category.order || '';
          
          // Update preview
          if (category.imageUrl) {
            const preview = document.getElementById('categoryImagePreview');
            preview.src = category.imageUrl;
            preview.style.display = 'block';
          }
          
          // Update status toggle
          document.getElementById('categoryStatusToggle').classList.toggle('active', category.active);
        }
      } else {
        title.textContent = 'Add Category';
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryImagePreview').style.display = 'none';
        document.getElementById('categoryStatusToggle').classList.add('active');
      }
      
      modal.classList.add('active');
    }
    
    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.remove('active');
      currentCategoryId = null;
      clearErrors();
    }
    
    function saveCategory() {
      clearErrors();
      
      const formData = new FormData(document.getElementById('categoryForm'));
      const data = Object.fromEntries(formData);
      
      // Validation
      let isValid = true;
      
      if (!data.name.trim()) {
        document.getElementById('nameError').textContent = 'Category name is required';
        document.getElementById('categoryName').classList.add('error');
        isValid = false;
      }
      
      if (!isValid) return;
      
      // Prepare category data
      const categoryData = {
        name: data.name,
        slug: data.slug || data.name.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-'),
        description: data.description,
        imageUrl: data.imageUrl,
        order: parseInt(data.order) || 1,
        active: document.getElementById('categoryStatusToggle').classList.contains('active')
      };
      
      if (currentCategoryId) {
        BA.update('ba_categories', currentCategoryId, categoryData);
        BA.log(`Category updated: ${categoryData.name}`);
        showToast('Category updated successfully', 'success');
      } else {
        BA.add('ba_categories', categoryData);
        BA.log(`Category added: ${categoryData.name}`);
        showToast('Category added successfully', 'success');
      }
      
      closeCategoryModal();
      loadCategories();
    }
    
    function editCategory(id) {
      openCategoryModal(id);
    }
    
    function deleteCategory(id) {
      const category = BA.getAll('ba_categories').find(c => c.id === id);
      if (category) {
        // Check if category has products
        const products = BA.getAll('ba_products');
        const productCount = products.filter(p => p.category === category.name).length;
        
        const message = productCount > 0 
          ? `This category contains ${productCount} products. Deleting it will remove the category from these products. Are you sure?`
          : `Are you sure you want to delete "${category.name}"? This cannot be undone.`;
        
        showConfirm(
          'Delete Category?',
          message,
          () => {
            BA.delete('ba_categories', id);
            BA.log(`Category deleted: ${category.name}`);
            showToast('Category deleted successfully', 'success');
            loadCategories();
          }
        );
      }
    }
    
    function toggleCategoryStatus(id) {
      const category = BA.getAll('ba_categories').find(c => c.id === id);
      if (category) {
        BA.update('ba_categories', id, { active: !category.active });
        BA.log(`Category status changed: ${category.name} - ${!category.active ? 'Active' : 'Inactive'}`);
        loadCategories();
      }
    }
    
    function toggleSwitch(element) {
      element.classList.toggle('active');
    }
    
    function clearErrors() {
      document.querySelectorAll('.error-label').forEach(el => el.textContent = '');
      document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
    }
    
    function updateBadges() {
      const enquiries = BA.getAll('ba_enquiries');
      const newCount = enquiries.filter(e => e.status === 'new').length;
      document.getElementById('enquiryBadge').textContent = newCount;
      document.getElementById('notificationBadge').textContent = newCount;
    }
  </script>
</body>
</html>
