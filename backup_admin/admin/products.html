<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Bhavya Agro Exports Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>BA</h1>
      <p>Admin</p>
    </div>
    
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="adminName">Omkar Gadghile</div>
      <div class="sidebar-user-role">Administrator</div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-nav-item">
        <i data-lucide="layout-dashboard"></i>
        Dashboard
      </a>
      <a href="products.html" class="sidebar-nav-item">
        <i data-lucide="package"></i>
        Products
      </a>
      <a href="enquiries.html" class="sidebar-nav-item">
        <i data-lucide="mail"></i>
        Enquiries
        <span class="sidebar-nav-badge" id="enquiryBadge">0</span>
      </a>
      <a href="categories.html" class="sidebar-nav-item">
        <i data-lucide="layout-grid"></i>
        Categories
      </a>
      <a href="certificates.html" class="sidebar-nav-item">
        <i data-lucide="badge-check"></i>
        Certifications
      </a>
      <a href="settings.html" class="sidebar-nav-item">
        <i data-lucide="settings"></i>
        Settings
      </a>
    </nav>
    
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank" class="sidebar-nav-item">
        <i data-lucide="external-link"></i>
        View Website
      </a>
      <a href="#" onclick="logout()" class="sidebar-nav-item">
        <i data-lucide="log-out"></i>
        Logout
      </a>
    </div>
  </aside>
  
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">Products</div>
    
    <div class="topbar-actions">
      <div class="topbar-search">
        <i data-lucide="search" class="topbar-search-icon"></i>
        <input type="text" placeholder="Search products..." id="productSearch">
      </div>
      
      <div style="position: relative;">
        <i data-lucide="bell" style="cursor: pointer; color: var(--light-text);"></i>
        <span class="sidebar-nav-badge" style="position: absolute; top: -8px; right: -8px;" id="notificationBadge">0</span>
      </div>
      
      <div class="topbar-avatar">BK</div>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main-content">
    <div class="content-area">
      <div class="page-header">
        <div class="section-label">Inventory</div>
        <h1 class="page-title">Products</h1>
      </div>
      
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="filter-tabs">
            <button class="filter-tab active" data-category="all">All</button>
            <button class="filter-tab" data-category="Fresh Fruits">Fresh Fruits</button>
            <button class="filter-tab" data-category="Cereals & Flakes">Cereals & Flakes</button>
            <button class="filter-tab" data-category="Spices & Agri">Spices & Agri</button>
          </div>
        </div>
        
        <div class="toolbar-right">
          <button class="btn btn-primary" onclick="openProductModal()">
            <i data-lucide="plus"></i>
            Add Product
          </button>
        </div>
      </div>
      
      <!-- Products Table -->
      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th style="width: 60px;">Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Origin</th>
              <th>Tag</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-panel" style="max-width: 900px;">
      <div class="modal-header">
        <h3 class="modal-title" id="productModalTitle">Add Product</h3>
        <button class="modal-close" onclick="closeProductModal()">
          <i data-lucide="x"></i>
        </button>
      </div>
      
      <form id="productForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <!-- Left Column -->
          <div>
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Product Name <span style="color: var(--clay);">*</span>
              </label>
              <input type="text" id="productName" name="name" required>
              <span class="error-label" id="nameError"></span>
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Category <span style="color: var(--clay);">*</span>
              </label>
              <select id="productCategory" name="category" required>
                <option value="">Select category</option>
              </select>
              <span class="error-label" id="categoryError"></span>
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Origin
              </label>
              <input type="text" id="productOrigin" name="origin">
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Tag / Badge
              </label>
              <input type="text" id="productTag" name="tag" placeholder="e.g., Bestseller, Organic">
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Short Description <span style="color: var(--clay);">*</span>
                <span style="float: right; color: var(--light-text); font-size: 10px;">
                  <span id="shortDescCount">0</span>/200
                </span>
              </label>
              <textarea id="productShortDesc" name="shortDesc" rows="3" maxlength="200" required></textarea>
              <span class="error-label" id="shortDescError"></span>
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Long Description
              </label>
              <textarea id="productLongDesc" name="longDesc" rows="4"></textarea>
            </div>
          </div>
          
          <!-- Right Column -->
          <div>
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Price Label
              </label>
              <input type="text" id="productPriceLabel" name="priceLabel" placeholder="e.g., On Request / tonne">
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Export Markets
              </label>
              <input type="text" id="productExportMarkets" name="exportMarkets" placeholder="Comma-separated">
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Image URL
              </label>
              <input type="url" id="productImageUrl" name="imageUrl">
              <div style="margin-top: 8px;">
                <img id="imagePreview" src="" style="width: 120px; height: 100px; object-fit: cover; border-radius: 4px; display: none;">
              </div>
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 12px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Featured Product
              </label>
              <div class="toggle-switch" id="featuredToggle" onclick="toggleSwitch(this)">
              </div>
            </div>
            
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 12px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Status
              </label>
              <div class="toggle-switch active" id="statusToggle" onclick="toggleSwitch(this)">
              </div>
            </div>
          </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--sand);">
          <button type="button" class="btn btn-outline" onclick="closeProductModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    let currentProductId = null;
    let currentFilter = 'all';
    
    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      
      loadProducts();
      loadCategories();
      setupEventListeners();
      updateBadges();
    });
    
    function setupEventListeners() {
      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.category;
          loadProducts();
        });
      });
      
      // Product form
      document.getElementById('productForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveProduct();
      });
      
      // Short description counter
      document.getElementById('productShortDesc').addEventListener('input', function() {
        document.getElementById('shortDescCount').textContent = this.value.length;
      });
      
      // Image preview
      document.getElementById('productImageUrl').addEventListener('blur', function() {
        const preview = document.getElementById('imagePreview');
        if (this.value) {
          preview.src = this.value;
          preview.style.display = 'block';
        } else {
          preview.style.display = 'none';
        }
      });
      
      // Search
      document.getElementById('productSearch').addEventListener('input', function() {
        loadProducts(this.value);
      });
    }
    
    function loadProducts(searchQuery = '') {
      const products = BA.getAll('ba_products');
      const filtered = products.filter(product => {
        const matchesFilter = currentFilter === 'all' || product.category === currentFilter;
        const matchesSearch = !searchQuery || 
          product.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          product.category.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesFilter && matchesSearch;
      });
      
      const table = document.getElementById('productsTable');
      
      if (filtered.length === 0) {
        table.innerHTML = `
          <tr>
            <td colspan="8" style="text-align: center; padding: 48px;">
              <div class="empty-state">
                <i data-lucide="package"></i>
                <h3>No products yet</h3>
                <p>Add your first product to get started</p>
                <button class="btn btn-primary" onclick="openProductModal()">
                  <i data-lucide="plus"></i>
                  Add Product
                </button>
              </div>
            </td>
          </tr>
        `;
      } else {
        table.innerHTML = filtered.map((product, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>
              <img src="${product.imageUrl}" style="width: 60px; height: 50px; object-fit: cover; border-radius: 4px;">
            </td>
            <td>${product.name}</td>
            <td>${product.category}</td>
            <td>${product.origin}</td>
            <td>${product.tag || '-'}</td>
            <td>
              <div class="toggle-switch ${product.active ? 'active' : ''}" onclick="toggleProductStatus(${product.id})"></div>
            </td>
            <td>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-sm btn-outline" onclick="editProduct(${product.id})">
                  <i data-lucide="edit-2"></i>
                </button>
                <button class="btn btn-sm btn-outline" style="color: var(--clay); border-color: var(--clay);" onclick="deleteProduct(${product.id})">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      }
      
      lucide.createIcons();
    }
    
    function loadCategories() {
      const categories = BA.getAll('ba_categories');
      const select = document.getElementById('productCategory');
      
      select.innerHTML = '<option value="">Select category</option>' + 
        categories.map(cat => `<option value="${cat.name}">${cat.name}</option>`).join('');
    }
    
    function openProductModal(productId = null) {
      currentProductId = productId;
      const modal = document.getElementById('productModal');
      const title = document.getElementById('productModalTitle');
      
      if (productId) {
        title.textContent = 'Edit Product';
        const product = BA.getAll('ba_products').find(p => p.id === productId);
        if (product) {
          document.getElementById('productName').value = product.name;
          document.getElementById('productCategory').value = product.category;
          document.getElementById('productOrigin').value = product.origin || '';
          document.getElementById('productTag').value = product.tag || '';
          document.getElementById('productShortDesc').value = product.shortDesc;
          document.getElementById('productLongDesc').value = product.longDesc || '';
          document.getElementById('productPriceLabel').value = product.priceLabel || '';
          document.getElementById('productExportMarkets').value = product.exportMarkets || '';
          document.getElementById('productImageUrl').value = product.imageUrl;
          
          // Update preview
          const preview = document.getElementById('imagePreview');
          preview.src = product.imageUrl;
          preview.style.display = 'block';
          
          // Update toggles
          document.getElementById('featuredToggle').classList.toggle('active', product.featured);
          document.getElementById('statusToggle').classList.toggle('active', product.active);
          
          // Update counter
          document.getElementById('shortDescCount').textContent = product.shortDesc.length;
        }
      } else {
        title.textContent = 'Add Product';
        document.getElementById('productForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('shortDescCount').textContent = '0';
        document.getElementById('featuredToggle').classList.remove('active');
        document.getElementById('statusToggle').classList.add('active');
      }
      
      modal.classList.add('active');
    }
    
    function closeProductModal() {
      document.getElementById('productModal').classList.remove('active');
      currentProductId = null;
      clearErrors();
    }
    
    function saveProduct() {
      clearErrors();
      
      const formData = new FormData(document.getElementById('productForm'));
      const data = Object.fromEntries(formData);
      
      // Validation
      let isValid = true;
      
      if (!data.name.trim()) {
        document.getElementById('nameError').textContent = 'Product name is required';
        document.getElementById('productName').classList.add('error');
        isValid = false;
      }
      
      if (!data.category) {
        document.getElementById('categoryError').textContent = 'Category is required';
        document.getElementById('productCategory').classList.add('error');
        isValid = false;
      }
      
      if (!data.shortDesc.trim()) {
        document.getElementById('shortDescError').textContent = 'Short description is required';
        document.getElementById('productShortDesc').classList.add('error');
        isValid = false;
      }
      
      if (!isValid) return;
      
      // Prepare product data
      const productData = {
        name: data.name,
        category: data.category,
        origin: data.origin,
        tag: data.tag,
        shortDesc: data.shortDesc,
        longDesc: data.longDesc,
        priceLabel: data.priceLabel,
        exportMarkets: data.exportMarkets,
        imageUrl: data.imageUrl || 'https://images.unsplash.com/photo-1546630392-898a438a8371?w=600',
        featured: document.getElementById('featuredToggle').classList.contains('active'),
        active: document.getElementById('statusToggle').classList.contains('active')
      };
      
      if (currentProductId) {
        BA.update('ba_products', currentProductId, productData);
        BA.log(`Product updated: ${productData.name}`);
        showToast('Product updated successfully', 'success');
      } else {
        BA.add('ba_products', productData);
        BA.log(`Product added: ${productData.name}`);
        showToast('Product added successfully', 'success');
      }
      
      closeProductModal();
      loadProducts();
    }
    
    function editProduct(id) {
      openProductModal(id);
    }
    
    function deleteProduct(id) {
      const product = BA.getAll('ba_products').find(p => p.id === id);
      if (product) {
        showConfirm(
          'Delete Product?',
          `Are you sure you want to delete "${product.name}"? This cannot be undone.`,
          () => {
            BA.delete('ba_products', id);
            BA.log(`Product deleted: ${product.name}`);
            showToast('Product deleted successfully', 'success');
            loadProducts();
          }
        );
      }
    }
    
    function toggleProductStatus(id) {
      const product = BA.getAll('ba_products').find(p => p.id === id);
      if (product) {
        BA.update('ba_products', id, { active: !product.active });
        BA.log(`Product status changed: ${product.name} - ${!product.active ? 'Active' : 'Inactive'}`);
        loadProducts();
      }
    }
    
    function toggleSwitch(element) {
      element.classList.toggle('active');
    }
    
    function clearErrors() {
      document.querySelectorAll('.error-label').forEach(el => el.textContent = '');
      document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
    }
    
    function updateBadges() {
      const enquiries = BA.getAll('ba_enquiries');
      const newCount = enquiries.filter(e => e.status === 'new').length;
      document.getElementById('enquiryBadge').textContent = newCount;
      document.getElementById('notificationBadge').textContent = newCount;
    }
  </script>
</body>
</html>
