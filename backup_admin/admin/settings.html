<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Bhavya Agro Exports Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>BA</h1>
      <p>Admin</p>
    </div>
    
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="adminName">Omkar Gadghile</div>
      <div class="sidebar-user-role">Administrator</div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-nav-item">
        <i data-lucide="layout-dashboard"></i>
        Dashboard
      </a>
      <a href="products.html" class="sidebar-nav-item">
        <i data-lucide="package"></i>
        Products
      </a>
      <a href="enquiries.html" class="sidebar-nav-item">
        <i data-lucide="mail"></i>
        Enquiries
        <span class="sidebar-nav-badge" id="enquiryBadge">0</span>
      </a>
      <a href="categories.html" class="sidebar-nav-item">
        <i data-lucide="layout-grid"></i>
        Categories
      </a>
      <a href="certificates.html" class="sidebar-nav-item">
        <i data-lucide="badge-check"></i>
        Certifications
      </a>
      <a href="settings.html" class="sidebar-nav-item">
        <i data-lucide="settings"></i>
        Settings
      </a>
    </nav>
    
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank" class="sidebar-nav-item">
        <i data-lucide="external-link"></i>
        View Website
      </a>
      <a href="#" onclick="logout()" class="sidebar-nav-item">
        <i data-lucide="log-out"></i>
        Logout
      </a>
    </div>
  </aside>
  
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">Settings</div>
    
    <div class="topbar-actions">
      <div class="topbar-search">
        <i data-lucide="search" class="topbar-search-icon"></i>
        <input type="text" placeholder="Search settings..." id="settingsSearch">
      </div>
      
      <div style="position: relative;">
        <i data-lucide="bell" style="cursor: pointer; color: var(--light-text);"></i>
        <span class="sidebar-nav-badge" style="position: absolute; top: -8px; right: -8px;" id="notificationBadge">0</span>
      </div>
      
      <div class="topbar-avatar">BK</div>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main-content">
    <div class="content-area">
      <div class="page-header">
        <div class="section-label">Configuration</div>
        <h1 class="page-title">Settings</h1>
      </div>
      
      <!-- Tabs -->
      <div class="filter-tabs" style="margin-bottom: 32px;">
        <button class="filter-tab active" data-tab="general">General</button>
        <button class="filter-tab" data-tab="profile">Admin Profile</button>
        <button class="filter-tab" data-tab="appearance">Appearance</button>
      </div>
      
      <!-- General Tab -->
      <div class="tab-content" id="generalTab">
        <div class="card">
          <form id="generalForm" style="max-width: 600px;">
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Company Name
              </label>
              <input type="text" id="companyName" name="companyName">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Tagline
              </label>
              <input type="text" id="tagline" name="tagline">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Phone
              </label>
              <input type="tel" id="phone" name="phone">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Email
              </label>
              <input type="email" id="email" name="email">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Address
              </label>
              <textarea id="address" name="address" rows="2"></textarea>
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Website URL
              </label>
              <input type="url" id="website" name="website">
            </div>
            
            <div style="margin-bottom: 32px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Google Maps Embed URL
              </label>
              <textarea id="mapsUrl" name="mapsUrl" rows="2" placeholder="Optional: Google Maps embed iframe URL"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Save General Settings</button>
          </form>
        </div>
      </div>
      
      <!-- Profile Tab -->
      <div class="tab-content" id="profileTab" style="display: none;">
        <div class="card">
          <form id="profileForm" style="max-width: 600px;">
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Admin Name
              </label>
              <input type="text" id="adminNameField" name="adminName">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Username
              </label>
              <input type="text" id="username" name="username" readonly style="background: var(--sand); color: var(--light-text);">
              <span style="font-size: 11px; color: var(--light-text); margin-top: 4px; display: block;">
                Username cannot be changed
              </span>
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Current Password
              </label>
              <input type="password" id="currentPassword" name="currentPassword">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                New Password
              </label>
              <input type="password" id="newPassword" name="newPassword">
            </div>
            
            <div style="margin-bottom: 32px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Confirm Password
              </label>
              <input type="password" id="confirmPassword" name="confirmPassword">
              <span class="error-label" id="passwordError"></span>
            </div>
            
            <button type="submit" class="btn btn-primary">Update Profile</button>
          </form>
        </div>
      </div>
      
      <!-- Appearance Tab -->
      <div class="tab-content" id="appearanceTab" style="display: none;">
        <div class="card">
          <form id="appearanceForm">
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Hero Tagline
              </label>
              <input type="text" id="heroTagline" name="heroTagline">
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Hero Subtitle
              </label>
              <textarea id="heroSubtitle" name="heroSubtitle" rows="2"></textarea>
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Marquee Items
              </label>
              <textarea id="marqueeItems" name="marqueeItems" rows="2" placeholder="Comma-separated items for scrolling marquee"></textarea>
              <span style="font-size: 11px; color: var(--light-text); margin-top: 4px; display: block;">
                Separate items with commas (e.g., Premium Grapes,Bhagwa Pomegranate,Organic Turmeric)
              </span>
            </div>
            
            <div style="margin-bottom: 24px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Featured Products
              </label>
              <div id="featuredProducts" style="display: grid; gap: 12px;">
                <!-- Populated by JavaScript -->
              </div>
            </div>
            
            <div style="margin-bottom: 32px;">
              <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
                Footer Tagline
              </label>
              <input type="text" id="footerTagline" name="footerTagline">
            </div>
            
            <button type="submit" class="btn btn-primary">Save Appearance</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    let currentTab = 'general';
    
    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      
      loadSettings();
      setupEventListeners();
      updateBadges();
    });
    
    function setupEventListeners() {
      // Tab switching
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          
          const tabName = this.dataset.tab;
          currentTab = tabName;
          
          // Hide all tabs
          document.querySelectorAll('.tab-content').forEach(content => {
            content.style.display = 'none';
          });
          
          // Show selected tab
          document.getElementById(tabName + 'Tab').style.display = 'block';
        });
      });
      
      // Form submissions
      document.getElementById('generalForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveGeneralSettings();
      });
      
      document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveProfileSettings();
      });
      
      document.getElementById('appearanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveAppearanceSettings();
      });
      
      // Password validation
      document.getElementById('confirmPassword').addEventListener('input', function() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = this.value;
        const errorEl = document.getElementById('passwordError');
        
        if (newPassword && confirmPassword !== newPassword) {
          errorEl.textContent = 'Passwords do not match';
          this.classList.add('error');
        } else {
          errorEl.textContent = '';
          this.classList.remove('error');
        }
      });
      
      // Search
      document.getElementById('settingsSearch').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        // Simple search implementation - could be enhanced
        console.log('Searching for:', query);
      });
    }
    
    function loadSettings() {
      const settings = BA.getSettings();
      
      // Load general settings
      document.getElementById('companyName').value = settings.companyName || '';
      document.getElementById('tagline').value = settings.tagline || '';
      document.getElementById('phone').value = settings.phone || '';
      document.getElementById('email').value = settings.email || '';
      document.getElementById('address').value = settings.address || '';
      document.getElementById('website').value = settings.website || '';
      document.getElementById('mapsUrl').value = settings.mapsUrl || '';
      
      // Load profile settings
      document.getElementById('adminNameField').value = settings.adminName || '';
      document.getElementById('username').value = settings.username || 'admin';
      
      // Load appearance settings
      document.getElementById('heroTagline').value = settings.heroTagline || '';
      document.getElementById('heroSubtitle').value = settings.heroSubtitle || '';
      document.getElementById('marqueeItems').value = settings.marqueeItems || '';
      document.getElementById('footerTagline').value = settings.footerTagline || '';
      
      // Load featured products checkboxes
      loadFeaturedProducts();
    }
    
    function loadFeaturedProducts() {
      const products = BA.getAll('ba_products');
      const settings = BA.getSettings();
      const container = document.getElementById('featuredProducts');
      
      container.innerHTML = products.map(product => `
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" name="featuredProducts" value="${product.id}" 
            ${product.featured ? 'checked' : ''} 
            onchange="toggleFeatured(${product.id})">
          <span>${product.name}</span>
        </label>
      `).join('');
    }
    
    function toggleFeatured(productId) {
      const products = BA.getAll('ba_products');
      const product = products.find(p => p.id === productId);
      if (product) {
        BA.update('ba_products', productId, { featured: !product.featured });
        BA.log(`Product featured status changed: ${product.name}`);
        showToast('Featured products updated', 'success');
      }
    }
    
    function saveGeneralSettings() {
      const formData = new FormData(document.getElementById('generalForm'));
      const settings = BA.getSettings();
      
      // Update settings
      Object.assign(settings, {
        companyName: formData.get('companyName'),
        tagline: formData.get('tagline'),
        phone: formData.get('phone'),
        email: formData.get('email'),
        address: formData.get('address'),
        website: formData.get('website'),
        mapsUrl: formData.get('mapsUrl')
      });
      
      BA.save('ba_settings', settings);
      BA.log('General settings updated');
      showToast('General settings saved successfully', 'success');
    }
    
    function saveProfileSettings() {
      const formData = new FormData(document.getElementById('profileForm'));
      const settings = BA.getSettings();
      
      const currentPassword = formData.get('currentPassword');
      const newPassword = formData.get('newPassword');
      const confirmPassword = formData.get('confirmPassword');
      
      // Validate password change
      if (newPassword) {
        if (currentPassword !== settings.password) {
          showToast('Current password is incorrect', 'error');
          return;
        }
        
        if (newPassword !== confirmPassword) {
          showToast('New passwords do not match', 'error');
          return;
        }
        
        // Update password
        settings.password = newPassword;
        BA.log('Admin password changed');
      }
      
      // Update admin name
      settings.adminName = formData.get('adminName');
      
      BA.save('ba_settings', settings);
      BA.log('Profile settings updated');
      
      // Update admin name in sidebar
      document.getElementById('adminName').textContent = settings.adminName;
      
      showToast('Profile updated successfully', 'success');
      
      // Clear password fields
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
    }
    
    function saveAppearanceSettings() {
      const formData = new FormData(document.getElementById('appearanceForm'));
      const settings = BA.getSettings();
      
      // Update settings
      Object.assign(settings, {
        heroTagline: formData.get('heroTagline'),
        heroSubtitle: formData.get('heroSubtitle'),
        marqueeItems: formData.get('marqueeItems'),
        footerTagline: formData.get('footerTagline')
      });
      
      BA.save('ba_settings', settings);
      BA.log('Appearance settings updated');
      showToast('Appearance settings saved successfully', 'success');
    }
    
    function updateBadges() {
      const enquiries = BA.getAll('ba_enquiries');
      const newCount = enquiries.filter(e => e.status === 'new').length;
      document.getElementById('enquiryBadge').textContent = newCount;
      document.getElementById('notificationBadge').textContent = newCount;
    }
  </script>
</body>
</html>
