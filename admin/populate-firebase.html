<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Populate Firebase Data</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2C1A0E;
            margin-bottom: 20px;
        }
        .button {
            background: #C9973A;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .button:hover {
            background: #B8852F;
        }
        .button.danger {
            background: #dc2626;
        }
        .button.danger:hover {
            background: #b91c1c;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }
        #console-output {
            background: #1f2937;
            color: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #f59e0b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>🔧 Firebase Data Population Tool</h1>
        
        <div class="warning">
            <strong>⚠️ Warning:</strong> This will delete all existing products and categories in Firebase and replace them with the complete dataset from the main website.
        </div>
        
        <div>
            <button class="button" onclick="verifyData()">🔍 Verify Current Data</button>
            <button class="button danger" onclick="populateFirebaseData()">🚀 Populate Complete Data</button>
        </div>
        
        <div id="status"></div>
        
        <div id="console-output"></div>
    </div>

    <script src="populate-firebase-data.js"></script>
    <script>
        // Override console.log to display in the page
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('console-output');
        
        function addToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : '#10b981';
            consoleOutput.innerHTML += `<div style="color: ${color};">[${timestamp}] ${message}</div>`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }
        
        async function verifyData() {
            showStatus('Verifying current Firebase data...', 'info');
            try {
                const success = await window.verifyData();
                if (success) {
                    showStatus('✅ Data verification complete! Check console for details.', 'success');
                } else {
                    showStatus('❌ Error verifying data. Check console for details.', 'error');
                }
            } catch (error) {
                showStatus('❌ Error verifying data: ' + error.message, 'error');
            }
        }
        
        async function populateFirebaseData() {
            if (!confirm('⚠️ This will delete all existing products and categories. Are you sure you want to continue?')) {
                return;
            }
            
            showStatus('Populating Firebase with complete dataset...', 'info');
            try {
                const success = await window.populateFirebaseData();
                if (success) {
                    showStatus('🎉 Firebase populated successfully! All categories and products from the main website are now available.', 'success');
                    // Auto-verify after population
                    setTimeout(verifyData, 2000);
                } else {
                    showStatus('❌ Error populating Firebase. Check console for details.', 'error');
                }
            } catch (error) {
                showStatus('❌ Error populating Firebase: ' + error.message, 'error');
            }
        }
        
        // Auto-verify on page load
        window.addEventListener('load', () => {
            setTimeout(verifyData, 1000);
        });
    </script>
</body>
</html>
