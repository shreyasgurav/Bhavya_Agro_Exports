<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certifications — Bhavya Agro Exports Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>VF</h1>
      <p>Admin</p>
    </div>
    
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="adminName">Omkar Ghadgile</div>
      <div class="sidebar-user-role">Administrator</div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-nav-item">
        <i data-lucide="layout-dashboard"></i>
        Dashboard
      </a>
      <a href="products.html" class="sidebar-nav-item">
        <i data-lucide="package"></i>
        Products
      </a>
      <a href="enquiries.html" class="sidebar-nav-item">
        <i data-lucide="mail"></i>
        Enquiries
        <span class="sidebar-nav-badge" id="enquiryBadge">0</span>
      </a>
      <a href="categories.html" class="sidebar-nav-item">
        <i data-lucide="layout-grid"></i>
        Categories
      </a>
      <a href="certificates.html" class="sidebar-nav-item">
        <i data-lucide="badge-check"></i>
        Certifications
      </a>
      <a href="settings.html" class="sidebar-nav-item">
        <i data-lucide="settings"></i>
        Settings
      </a>
    </nav>
    
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank" class="sidebar-nav-item">
        <i data-lucide="external-link"></i>
        View Website
      </a>
      <a href="#" onclick="logout()" class="sidebar-nav-item">
        <i data-lucide="log-out"></i>
        Logout
      </a>
    </div>
  </aside>
  
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">Certifications</div>
    
    <div class="topbar-actions">
      <div class="topbar-search">
        <i data-lucide="search" class="topbar-search-icon"></i>
        <input type="text" placeholder="Search certificates..." id="certificateSearch">
      </div>
      
      <div style="position: relative;">
        <i data-lucide="bell" style="cursor: pointer; color: var(--light-text);"></i>
        <span class="sidebar-nav-badge" style="position: absolute; top: -8px; right: -8px;" id="notificationBadge">0</span>
      </div>
      
      <div class="topbar-avatar">BK</div>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main-content">
    <div class="content-area">
      <div class="page-header">
        <div class="section-label">Compliance</div>
        <h1 class="page-title">Certifications</h1>
      </div>
      
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left"></div>
        
        <div class="toolbar-right">
          <button class="btn btn-primary" onclick="openCertificateModal()">
            <i data-lucide="plus"></i>
            Add Certificate
          </button>
        </div>
      </div>
      
      <!-- Certifications Grid -->
      <div id="certificatesGrid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </main>
  
  <!-- Certificate Modal -->
  <div class="modal-overlay" id="certificateModal">
    <div class="modal-panel" style="max-width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="certificateModalTitle">Add Certificate</h3>
        <button class="modal-close" onclick="closeCertificateModal()">
          <i data-lucide="x"></i>
        </button>
      </div>
      
      <form id="certificateForm">
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Certificate Name <span style="color: var(--clay);">*</span>
          </label>
          <input type="text" id="certificateName" name="name" required>
          <span class="error-label" id="nameError"></span>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Issuing Authority <span style="color: var(--clay);">*</span>
          </label>
          <input type="text" id="certificateAuthority" name="authority" required>
          <span class="error-label" id="authorityError"></span>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Description
          </label>
          <textarea id="certificateDescription" name="description" rows="3"></textarea>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Badge Text
          </label>
          <input type="text" id="certificateBadge" name="badgeText" placeholder="e.g., Govt. of India">
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Icon (emoji)
          </label>
          <input type="text" id="certificateIcon" name="icon" placeholder="🏆" maxlength="1" style="text-align: center; font-size: 24px; padding: 8px;">
          <div style="margin-top: 8px;">
            <span style="font-size: 11px; color: var(--light-text);">Single character emoji for icon display</span>
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Valid Until
          </label>
          <input type="date" id="certificateValidUntil" name="validUntil">
          <span style="font-size: 11px; color: var(--light-text); margin-top: 4px; display: block;">
            Leave empty for ongoing certificates
          </span>
        </div>
        
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 12px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--light-text);">
            Status
          </label>
          <div class="toggle-switch active" id="certificateStatusToggle" onclick="toggleSwitch(this)">
          </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--sand);">
          <button type="button" class="btn btn-outline" onclick="closeCertificateModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Certificate</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    let currentCertificateId = null;
    
    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      
      loadCertifications();
      setupEventListeners();
      updateBadges();
    });
    
    function setupEventListeners() {
      // Certificate form
      document.getElementById('certificateForm').addEventListener('submit', function(e) {
        e.preventDefault();
        saveCertificate();
      });
      
      // Icon preview
      document.getElementById('certificateIcon').addEventListener('input', function() {
        if (this.value) {
          this.style.background = 'var(--warm-white)';
          this.style.borderColor = 'var(--sand)';
        }
      });
      
      // Search
      document.getElementById('certificateSearch').addEventListener('input', function() {
        loadCertifications(this.value);
      });
    }
    
    function loadCertifications(searchQuery = '') {
      const certificates = VF.getAll('vf_certificates');
      
      const filtered = certificates.filter(certificate => {
        const matchesSearch = !searchQuery || 
          certificate.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          certificate.authority.toLowerCase().includes(searchQuery.toLowerCase()) ||
          certificate.description.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesSearch;
      });
      
      const grid = document.getElementById('certificatesGrid');
      
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 48px;">
            <div class="empty-state">
              <i data-lucide="badge-check"></i>
              <h3>No certificates yet</h3>
              <p>Add your first certificate to showcase credentials</p>
              <button class="btn btn-primary" onclick="openCertificateModal()">
                <i data-lucide="plus"></i>
                Add Certificate
              </button>
            </div>
          </div>
        `;
      } else {
        grid.innerHTML = filtered.map(certificate => `
          <div class="card">
            <div style="display: flex; gap: 20px; padding: 24px;">
              <div style="flex-shrink: 0;">
                <div style="width: 64px; height: 64px; background: var(--sand); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 32px;">
                  ${certificate.icon || '🏆'}
                </div>
              </div>
              <div style="flex: 1;">
                <h3 style="font-size: 22px; margin-bottom: 4px;">${certificate.name}</h3>
                <p style="font-size: 11px; color: var(--sage); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;">
                  ${certificate.authority}
                </p>
                <p style="color: var(--light-text); font-size: 13px; margin-bottom: 12px;">
                  ${certificate.description}
                </p>
                
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                  ${certificate.badgeText ? `<span class="badge badge-sand">${certificate.badgeText}</span>` : ''}
                  <span style="font-size: 12px; color: var(--light-text);">
                    ${certificate.validUntil ? `Valid until ${new Date(certificate.validUntil).toLocaleDateString()}` : 'Ongoing'}
                  </span>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: space-between;">
                  <div class="toggle-switch ${certificate.active ? 'active' : ''}" onclick="toggleCertificateStatus(${certificate.id})"></div>
                  <div style="display: flex; gap: 8px;">
                    <button class="btn btn-sm btn-outline" onclick="editCertificate(${certificate.id})">
                      <i data-lucide="edit-2"></i>
                    </button>
                    <button class="btn btn-sm btn-outline" style="color: var(--clay); border-color: var(--clay);" onclick="deleteCertificate(${certificate.id})">
                      <i data-lucide="trash-2"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      }
      
      lucide.createIcons();
    }
    
    function openCertificateModal(certificateId = null) {
      currentCertificateId = certificateId;
      const modal = document.getElementById('certificateModal');
      const title = document.getElementById('certificateModalTitle');
      
      if (certificateId) {
        title.textContent = 'Edit Certificate';
        const certificate = VF.getAll('vf_certificates').find(c => c.id === certificateId);
        if (certificate) {
          document.getElementById('certificateName').value = certificate.name;
          document.getElementById('certificateAuthority').value = certificate.authority;
          document.getElementById('certificateDescription').value = certificate.description || '';
          document.getElementById('certificateBadge').value = certificate.badgeText || '';
          document.getElementById('certificateIcon').value = certificate.icon || '';
          document.getElementById('certificateValidUntil').value = certificate.validUntil || '';
          
          // Update status toggle
          document.getElementById('certificateStatusToggle').classList.toggle('active', certificate.active);
        }
      } else {
        title.textContent = 'Add Certificate';
        document.getElementById('certificateForm').reset();
        document.getElementById('certificateStatusToggle').classList.add('active');
      }
      
      modal.classList.add('active');
    }
    
    function closeCertificateModal() {
      document.getElementById('certificateModal').classList.remove('active');
      currentCertificateId = null;
      clearErrors();
    }
    
    function saveCertificate() {
      clearErrors();
      
      const formData = new FormData(document.getElementById('certificateForm'));
      const data = Object.fromEntries(formData);
      
      // Validation
      let isValid = true;
      
      if (!data.name.trim()) {
        document.getElementById('nameError').textContent = 'Certificate name is required';
        document.getElementById('certificateName').classList.add('error');
        isValid = false;
      }
      
      if (!data.authority.trim()) {
        document.getElementById('authorityError').textContent = 'Issuing authority is required';
        document.getElementById('certificateAuthority').classList.add('error');
        isValid = false;
      }
      
      if (!isValid) return;
      
      // Prepare certificate data
      const certificateData = {
        name: data.name,
        authority: data.authority,
        description: data.description,
        badgeText: data.badgeText,
        icon: data.icon || '🏆',
        validUntil: data.validUntil,
        active: document.getElementById('certificateStatusToggle').classList.contains('active')
      };
      
      if (currentCertificateId) {
        VF.update('vf_certificates', currentCertificateId, certificateData);
        VF.log(`Certificate updated: ${certificateData.name}`);
        showToast('Certificate updated successfully', 'success');
      } else {
        VF.add('vf_certificates', certificateData);
        VF.log(`Certificate added: ${certificateData.name}`);
        showToast('Certificate added successfully', 'success');
      }
      
      closeCertificateModal();
      loadCertifications();
    }
    
    function editCertificate(id) {
      openCertificateModal(id);
    }
    
    function deleteCertificate(id) {
      const certificate = VF.getAll('vf_certificates').find(c => c.id === id);
      if (certificate) {
        showConfirm(
          'Delete Certificate?',
          `Are you sure you want to delete "${certificate.name}"? This cannot be undone.`,
          () => {
            VF.delete('vf_certificates', id);
            VF.log(`Certificate deleted: ${certificate.name}`);
            showToast('Certificate deleted successfully', 'success');
            loadCertifications();
          }
        );
      }
    }
    
    function toggleCertificateStatus(id) {
      const certificate = VF.getAll('vf_certificates').find(c => c.id === id);
      if (certificate) {
        VF.update('vf_certificates', id, { active: !certificate.active });
        VF.log(`Certificate status changed: ${certificate.name} - ${!certificate.active ? 'Active' : 'Inactive'}`);
        loadCertifications();
      }
    }
    
    function toggleSwitch(element) {
      element.classList.toggle('active');
    }
    
    function clearErrors() {
      document.querySelectorAll('.error-label').forEach(el => el.textContent = '');
      document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
    }
    
    function updateBadges() {
      const enquiries = VF.getAll('vf_enquiries');
      const newCount = enquiries.filter(e => e.status === 'new').length;
      document.getElementById('enquiryBadge').textContent = newCount;
      document.getElementById('notificationBadge').textContent = newCount;
    }
  </script>
</body>
</html>
