<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavya Agro Exports — Admin Inbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Bhavya Agro Exports</h1>
            <p>Admin Panel</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Enter</button>
            <div id="error-msg" class="error-msg">Incorrect username or password</div>
        </div>
    </div>

    <!-- MESSAGE OVERLAY -->
    <div id="msg-overlay">
        <div class="msg-box">
            <h3 id="msg-sender-name">Message</h3>
            <p id="msg-full-text"></p>
            <button onclick="window.closeMsg()">Close</button>
        </div>
    </div>

    <!-- INBOX PAGE -->
    <div id="inbox-page">
        <div class="header-section">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2>Inbox</h2>
                <div id="count-badge" class="count-badge">0 new inquiries</div>
            </div>
            <div onclick="logout()" style="font-size: 12px; color: var(--grey); cursor: pointer;">Log out</div>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>City</th>
                            <th>Phone</th>
                            <th>Message</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inbox-tbody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
