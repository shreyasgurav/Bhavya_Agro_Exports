<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavya Agro Exports — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Bhavya Agro Exports</h1>
            <p>Admin Panel</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Enter</button>
            <div id="error-msg" class="error-msg">Incorrect username or password</div>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dashboard" style="display: none;">
        <header class="admin-header">
            <div class="header-left">
                <h1>Bhavya Agro Exports Admin</h1>
            </div>
            <div class="header-right">
                <button onclick="logout()" class="logout-btn">Log out</button>
            </div>
        </header>

        <nav class="admin-nav">
            <button class="nav-btn active" onclick="showSection('inbox')">📥 Inbox</button>
            <button class="nav-btn" onclick="showSection('products')">📦 Products</button>
            <button class="nav-btn" onclick="showSection('categories')">🏷️ Categories</button>
        </nav>

        <section id="inbox-section" class="admin-section">
            <div class="section-header">
                <h2>Inbox</h2>
                <div id="count-badge" class="count-badge">0 new inquiries</div>
            </div>
            <div id="inbox-container">
                <p>Loading inquiries...</p>
            </div>
        </section>

        <section id="products-section" class="admin-section" style="display: none;">
            <div class="section-header">
                <h2>Products</h2>
                <button class="add-btn" onclick="openAddProductModal()">+ Add Product</button>
            </div>
            <div id="products-container">
                <p>Loading products...</p>
            </div>
        </section>

        <section id="categories-section" class="admin-section" style="display: none;">
            <div class="section-header">
                <h2>Categories</h2>
                <button class="add-btn" onclick="openAddCategoryModal()">+ Add Category</button>
            </div>
            <div id="categories-container">
                <p>Loading categories...</p>
            </div>
        </section>
    </div>

    <!-- MESSAGE OVERLAY -->
    <div id="msg-overlay">
        <div class="msg-box">
            <h3 id="msg-sender-name">Message</h3>
            <p id="msg-full-text"></p>
            <button onclick="window.closeMsg()">Close</button>
        </div>
    </div>

    <!-- ADD PRODUCT MODAL -->
    <div id="add-product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Product</h3>
                <button class="close-btn" onclick="closeAddProductModal()">×</button>
            </div>
            <form id="add-product-form">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="product-name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="product-category" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-description" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <div class="image-upload-container">
                        <div class="upload-mode-toggle">
                            <button type="button" class="mode-btn active" onclick="setUploadMode('file')">📎 Upload File</button>
                            <button type="button" class="mode-btn" onclick="setUploadMode('url')">🔗 Paste URL</button>
                        </div>
                        <div id="file-upload-mode" class="upload-mode">
                            <input type="file" id="product-image-file" accept=".jpg,.jpeg,.png,.webp" style="display: none;">
                            <div class="upload-zone" onclick="document.getElementById('product-image-file').click()">
                                <div class="upload-icon">📁</div>
                                <p>Click to upload or drag image here</p>
                                <div class="upload-progress" style="display: none;">
                                    <div class="progress-bar"></div>
                                </div>
                            </div>
                        </div>
                        <div id="url-upload-mode" class="upload-mode" style="display: none;">
                            <input type="url" id="product-image" placeholder="https://example.com/image.jpg">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="product-status" required>
                        <option value="available">Available</option>
                        <option value="on-request">On Request</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeAddProductModal()">Cancel</button>
                    <button type="submit">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADD CATEGORY MODAL -->
    <div id="add-category-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Category</h3>
                <button class="close-btn" onclick="closeAddCategoryModal()">×</button>
            </div>
            <form id="add-category-form">
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="category-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="category-description" rows="4"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeAddCategoryModal()">Cancel</button>
                    <button type="submit">Add Category</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="admin.js" defer></script>
</body>
</html>
