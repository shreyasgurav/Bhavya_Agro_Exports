<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiries — Bhavya Agro Exports Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>VF</h1>
      <p>Admin</p>
    </div>
    
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="adminName">Omkar Ghadgile</div>
      <div class="sidebar-user-role">Administrator</div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-nav-item">
        <i data-lucide="layout-dashboard"></i>
        Dashboard
      </a>
      <a href="products.html" class="sidebar-nav-item">
        <i data-lucide="package"></i>
        Products
      </a>
      <a href="enquiries.html" class="sidebar-nav-item">
        <i data-lucide="mail"></i>
        Enquiries
        <span class="sidebar-nav-badge" id="enquiryBadge">0</span>
      </a>
      <a href="categories.html" class="sidebar-nav-item">
        <i data-lucide="layout-grid"></i>
        Categories
      </a>
      <a href="certificates.html" class="sidebar-nav-item">
        <i data-lucide="badge-check"></i>
        Certifications
      </a>
      <a href="settings.html" class="sidebar-nav-item">
        <i data-lucide="settings"></i>
        Settings
      </a>
    </nav>
    
    <div class="sidebar-bottom">
      <a href="../index.html" target="_blank" class="sidebar-nav-item">
        <i data-lucide="external-link"></i>
        View Website
      </a>
      <a href="#" onclick="logout()" class="sidebar-nav-item">
        <i data-lucide="log-out"></i>
        Logout
      </a>
    </div>
  </aside>
  
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-title">Enquiries</div>
    
    <div class="topbar-actions">
      <div class="topbar-search">
        <i data-lucide="search" class="topbar-search-icon"></i>
        <input type="text" placeholder="Search enquiries..." id="enquirySearch">
      </div>
      
      <div style="position: relative;">
        <i data-lucide="bell" style="cursor: pointer; color: var(--light-text);"></i>
        <span class="sidebar-nav-badge" style="position: absolute; top: -8px; right: -8px;" id="notificationBadge">0</span>
      </div>
      
      <div class="topbar-avatar">BK</div>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main-content">
    <div class="content-area">
      <div class="page-header">
        <div class="section-label">Communication</div>
        <h1 class="page-title">Enquiries</h1>
      </div>
      
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="filter-tabs">
            <button class="filter-tab active" data-status="all">All</button>
            <button class="filter-tab" data-status="new">
              New
              <span class="sidebar-nav-badge" id="newBadge">0</span>
            </button>
            <button class="filter-tab" data-status="replied">Replied</button>
            <button class="filter-tab" data-status="archived">Archived</button>
          </div>
        </div>
        
        <div class="toolbar-right">
          <button class="btn btn-outline" onclick="exportCSV()">
            <i data-lucide="download"></i>
            Export CSV
          </button>
        </div>
      </div>
      
      <!-- Enquiries Table -->
      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Company</th>
              <th>Email</th>
              <th>Country</th>
              <th>Product</th>
              <th>Type</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="enquiriesTable">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <!-- View Enquiry Modal -->
  <div class="modal-overlay" id="enquiryModal">
    <div class="modal-panel" style="max-width: 700px;">
      <div class="modal-header">
        <h3 class="modal-title" id="enquiryModalTitle">Enquiry Details</h3>
        <button class="modal-close" onclick="closeEnquiryModal()">
          <i data-lucide="x"></i>
        </button>
      </div>
      
      <div id="enquiryModalContent">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </div>
  
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
  <script>
    let currentFilter = 'all';
    let currentEnquiry = null;
    
    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAuth()) return;
      
      loadEnquiries();
      setupEventListeners();
      updateBadges();
    });
    
    function setupEventListeners() {
      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.status;
          loadEnquiries();
        });
      });
      
      // Search
      document.getElementById('enquirySearch').addEventListener('input', function() {
        loadEnquiries(this.value);
      });
    }
    
    function loadEnquiries(searchQuery = '') {
      const enquiries = VF.getAll('vf_enquiries');
      const filtered = enquiries.filter(enquiry => {
        const matchesFilter = currentFilter === 'all' || enquiry.status === currentFilter;
        const matchesSearch = !searchQuery || 
          enquiry.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          enquiry.company.toLowerCase().includes(searchQuery.toLowerCase()) ||
          enquiry.productInterest.toLowerCase().includes(searchQuery.toLowerCase()) ||
          enquiry.country.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesFilter && matchesSearch;
      });
      
      // Sort by date (newest first)
      filtered.sort((a, b) => new Date(b.receivedAt) - new Date(a.receivedAt));
      
      const table = document.getElementById('enquiriesTable');
      
      if (filtered.length === 0) {
        table.innerHTML = `
          <tr>
            <td colspan="10" style="text-align: center; padding: 48px;">
              <div class="empty-state">
                <i data-lucide="mail"></i>
                <h3>No enquiries yet</h3>
                <p>Customer enquiries will appear here</p>
              </div>
            </td>
          </tr>
        `;
      } else {
        table.innerHTML = filtered.map((enquiry, index) => `
          <tr ${enquiry.status === 'new' ? 'style="border-left: 2px solid var(--gold);"' : ''}>
            <td>${index + 1}</td>
            <td>${enquiry.name}</td>
            <td>${enquiry.company}</td>
            <td>${enquiry.email}</td>
            <td>${enquiry.country}</td>
            <td>${enquiry.productInterest}</td>
            <td>${enquiry.enquiryType}</td>
            <td>${new Date(enquiry.receivedAt).toLocaleDateString()}</td>
            <td><span class="badge badge-${enquiry.status}">${enquiry.status}</span></td>
            <td>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-sm btn-outline" onclick="viewEnquiry(${enquiry.id})">
                  <i data-lucide="eye"></i>
                </button>
                ${enquiry.status !== 'replied' ? `
                  <button class="btn btn-sm btn-outline" onclick="markAsReplied(${enquiry.id})">
                    <i data-lucide="check"></i>
                  </button>
                ` : ''}
                ${enquiry.status !== 'archived' ? `
                  <button class="btn btn-sm btn-outline" onclick="archiveEnquiry(${enquiry.id})">
                    <i data-lucide="archive"></i>
                  </button>
                ` : ''}
                <button class="btn btn-sm btn-outline" style="color: var(--clay); border-color: var(--clay);" onclick="deleteEnquiry(${enquiry.id})">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      }
      
      lucide.createIcons();
    }
    
    function viewEnquiry(id) {
      currentEnquiry = VF.getAll('vf_enquiries').find(e => e.id === id);
      if (!currentEnquiry) return;
      
      const modal = document.getElementById('enquiryModal');
      const content = document.getElementById('enquiryModalContent');
      
      content.innerHTML = `
        <div style="margin-bottom: 24px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
            <div>
              <h2 style="font-size: 26px; margin-bottom: 4px;">${currentEnquiry.name}</h2>
              <p style="color: var(--light-text); font-size: 14px;">${currentEnquiry.company}</p>
            </div>
            <div style="text-align: right;">
              <span class="badge badge-${currentEnquiry.status}">${currentEnquiry.status}</span>
              <p style="color: var(--light-text); font-size: 12px; margin-top: 8px;">
                ${new Date(currentEnquiry.receivedAt).toLocaleDateString()}
              </p>
            </div>
          </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div>
            <div style="margin-bottom: 16px;">
              <label style="font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--light-text);">Email</label>
              <p style="color: var(--earth);"><a href="mailto:${currentEnquiry.email}">${currentEnquiry.email}</a></p>
            </div>
            <div style="margin-bottom: 16px;">
              <label style="font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--light-text);">Phone</label>
              <p style="color: var(--earth);">${currentEnquiry.phone}</p>
            </div>
          </div>
          <div>
            <div style="margin-bottom: 16px;">
              <label style="font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--light-text);">Country</label>
              <p style="color: var(--earth);">${currentEnquiry.country}</p>
            </div>
            <div style="margin-bottom: 16px;">
              <label style="font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--light-text);">Enquiry Type</label>
              <p style="color: var(--earth);">${currentEnquiry.enquiryType}</p>
            </div>
          </div>
        </div>
        
        <div style="margin-bottom: 24px;">
          <label style="font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--light-text);">Product Interest</label>
          <p style="color: var(--earth);">${currentEnquiry.productInterest}</p>
        </div>
        
        <div style="margin-bottom: 32px;">
          <div class="section-label" style="margin-bottom: 12px;">Message</div>
          <div style="background: var(--warm-white); padding: 24px; border-radius: 4px; font-style: italic; line-height: 1.7; color: var(--earth);">
            ${currentEnquiry.message}
          </div>
        </div>
        
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
          ${currentEnquiry.status !== 'replied' ? `
            <button class="btn btn-primary" onclick="markAsReplied(${currentEnquiry.id})">
              <i data-lucide="check"></i>
              Mark as Replied
            </button>
          ` : ''}
          ${currentEnquiry.status !== 'archived' ? `
            <button class="btn btn-outline" onclick="archiveEnquiry(${currentEnquiry.id})">
              <i data-lucide="archive"></i>
              Archive
            </button>
          ` : ''}
          <button class="btn btn-outline" onclick="replyEmail()">
            <i data-lucide="mail"></i>
            Reply via Email
          </button>
          <button class="btn btn-outline" onclick="closeEnquiryModal()" style="color: var(--light-text);">
            Close
          </button>
        </div>
      `;
      
      modal.classList.add('active');
      lucide.createIcons();
    }
    
    function closeEnquiryModal() {
      document.getElementById('enquiryModal').classList.remove('active');
      currentEnquiry = null;
    }
    
    function markAsReplied(id) {
      const enquiry = VF.getAll('vf_enquiries').find(e => e.id === id);
      if (enquiry) {
        VF.update('vf_enquiries', id, { status: 'replied' });
        VF.log(`Enquiry marked as replied: ${enquiry.name} - ${enquiry.company}`);
        showToast('Enquiry marked as replied', 'success');
        loadEnquiries();
        updateBadges();
        if (currentEnquiry && currentEnquiry.id === id) {
          closeEnquiryModal();
        }
      }
    }
    
    function archiveEnquiry(id) {
      const enquiry = VF.getAll('vf_enquiries').find(e => e.id === id);
      if (enquiry) {
        VF.update('vf_enquiries', id, { status: 'archived' });
        VF.log(`Enquiry archived: ${enquiry.name} - ${enquiry.company}`);
        showToast('Enquiry archived', 'success');
        loadEnquiries();
        updateBadges();
        if (currentEnquiry && currentEnquiry.id === id) {
          closeEnquiryModal();
        }
      }
    }
    
    function deleteEnquiry(id) {
      const enquiry = VF.getAll('vf_enquiries').find(e => e.id === id);
      if (enquiry) {
        showConfirm(
          'Delete Enquiry?',
          `Are you sure you want to delete the enquiry from "${enquiry.name}"? This cannot be undone.`,
          () => {
            VF.delete('vf_enquiries', id);
            VF.log(`Enquiry deleted: ${enquiry.name} - ${enquiry.company}`);
            showToast('Enquiry deleted successfully', 'success');
            loadEnquiries();
            updateBadges();
          }
        );
      }
    }
    
    function replyEmail() {
      if (!currentEnquiry) return;
      
      const subject = encodeURIComponent(`Re: Your Enquiry — Bhavya Agro Exports`);
      const body = encodeURIComponent(`Dear ${currentEnquiry.name},\n\nThank you for your enquiry regarding ${currentEnquiry.productInterest}.\n\nWe have received your message and will get back to you shortly with detailed information.\n\nBest regards,\nBhavya Agro Exports Team`);
      
      window.open(`mailto:${currentEnquiry.email}?subject=${subject}&body=${body}`);
    }
    
    function exportCSV() {
      const enquiries = VF.getAll('vf_enquiries');
      const csv = [
        ['Name', 'Company', 'Email', 'Phone', 'Country', 'Product', 'Type', 'Message', 'Status', 'Date'],
        ...enquiries.map(e => [
          e.name,
          e.company,
          e.email,
          e.phone,
          e.country,
          e.productInterest,
          e.enquiryType,
          `"${e.message.replace(/"/g, '""')}"`,
          e.status,
          new Date(e.receivedAt).toLocaleDateString()
        ])
      ].map(row => row.join(',')).join('\n');
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Bhavya Agro-enquiries-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      window.URL.revokeObjectURL(url);
      
      VF.log('Enquiries exported to CSV');
      showToast('Enquiries exported successfully', 'success');
    }
    
    function updateBadges() {
      const enquiries = VF.getAll('vf_enquiries');
      const newCount = enquiries.filter(e => e.status === 'new').length;
      document.getElementById('enquiryBadge').textContent = newCount;
      document.getElementById('notificationBadge').textContent = newCount;
      document.getElementById('newBadge').textContent = newCount;
    }
  </script>
</body>
</html>
