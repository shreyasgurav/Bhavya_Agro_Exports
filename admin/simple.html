<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavya Agro Exports — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Bhavya Agro Exports</h1>
            <p>Admin Panel</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Enter</button>
            <div id="error-msg" class="error-msg">Incorrect username or password</div>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dashboard" style="display: none;">
        <header class="admin-header">
            <div class="header-left">
                <h1>Bhavya Agro Exports Admin</h1>
            </div>
            <div class="header-right">
                <button onclick="logout()" class="logout-btn">Log out</button>
            </div>
        </header>

        <nav class="admin-nav">
            <button class="nav-btn active" onclick="showSection('inbox')">📥 Inbox</button>
            <button class="nav-btn" onclick="showSection('products')">📦 Products</button>
            <button class="nav-btn" onclick="showSection('categories')">🏷️ Categories</button>
        </nav>

        <section id="inbox-section" class="admin-section">
            <div class="section-header">
                <h2>Inbox</h2>
                <div id="count-badge" class="count-badge">0 new inquiries</div>
            </div>
            <p>Admin panel loaded successfully! Firebase connection working.</p>
        </section>

        <section id="products-section" class="admin-section" style="display: none;">
            <div class="section-header">
                <h2>Products</h2>
            </div>
            <p>Products section - coming soon!</p>
        </section>

        <section id="categories-section" class="admin-section" style="display: none;">
            <div class="section-header">
                <h2>Categories</h2>
            </div>
            <p>Categories section - coming soon!</p>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore.js";
        
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDDgkJZA6BpTYLoCfVFdcvHbLzp6D_0bU4",
            authDomain: "bhavya-agro-d3407.firebaseapp.com",
            projectId: "bhavya-agro-d3407",
            storageBucket: "bhavya-agro-d3407.firebasestorage.app",
            messagingSenderId: "701815969630",
            appId: "1:701815969630:web:d38ef87a8204b72f2f61cf",
            measurementId: "G-GMV0NN4VKR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Make db available globally
        window.db = db;
        
        console.log('Firebase initialized successfully');
        
        // Load our script after Firebase is ready
        const script = document.createElement('script');
        script.src = 'admin-simple.js';
        script.onload = function() {
            console.log('Admin script loaded');
        };
        script.onerror = function() {
            console.error('Admin script failed to load');
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
