<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavya Agro Exports — Admin Inbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5F0E8;
            --earth: #2C1A0E;
            --gold: #C9973A;
            --pale-gold: #FFF8EC;
            --white: #FFFFFF;
            --grey: #8E8E8E;
            --green: #2E7D32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--earth);
            min-height: 100vh;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            inset: 0;
            background-color: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(44, 26, 14, 0.1);
        }

        .login-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            margin-bottom: 8px;
            color: var(--earth);
        }

        .login-card p {
            font-size: 14px;
            color: var(--grey);
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-card input:focus {
            border-color: var(--gold);
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background-color: var(--gold);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .login-card button:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: #D32F2F;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* INBOX PAGE */
        #inbox-page {
            display: none;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .header-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 400;
        }

        .count-badge {
            background-color: var(--gold);
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
        }

        .table-container {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #F9F9F9;
            color: var(--grey);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px;
            border-bottom: 1px solid #EEEEEE;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #EEEEEE;
            font-size: 14px;
            vertical-align: middle;
        }

        .row-new {
            background-color: var(--pale-gold);
        }

        .row-done {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .msg-cell {
            color: #555;
            max-width: 350px;
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 13px;
        }

        /* MESSAGE OVERLAY */
        #msg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(44, 26, 14, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .msg-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .msg-box h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-bottom: 15px;
            border-bottom: 1px solid #EEE;
            padding-bottom: 10px;
        }

        .msg-box p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--earth);
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        .msg-box button {
            width: 100%;
            padding: 12px;
            background: var(--earth);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .action-btn {
            border: none;
            padding: 6px 14px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-done {
            background-color: var(--green);
            color: white;
        }

        .btn-reopen {
            background-color: #E0E0E0;
            color: var(--earth);
        }

        .status-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .tag-new {
            background-color: #C9973A22;
            color: var(--gold);
        }

        .tag-done {
            background-color: #EEEEEE;
            color: var(--grey);
        }

        @media (max-width: 768px) {
            #inbox-page {
                padding: 20px 10px;
            }

            .header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                margin-bottom: 20px;
            }

            .header-section h2 { 
                font-size: 32px; 
            }

            /* TABLE TO CARDS */
            .table-container {
                background: transparent;
                box-shadow: none;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr {
                background: var(--white);
                margin-bottom: 20px;
                border-radius: 12px;
                padding: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            }

            td {
                border: none;
                padding: 8px 0;
                display: flex;
                flex-direction: column;
                position: relative;
                padding-left: 0;
                min-height: auto;
            }

            td::before {
                content: attr(data-label);
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: var(--grey);
                margin-bottom: 4px;
                display: block;
                font-weight: 700;
            }

            .msg-cell {
                max-width: 100%;
                font-size: 14px;
            }

            .action-btn {
                width: 100%;
                padding: 12px;
                margin-top: 10px;
                border-radius: 8px;
            }

            .row-new {
                border-left: 4px solid var(--gold);
            }

            .row-done {
                opacity: 0.8;
                text-decoration: none;
            }
            
            .row-done td::before {
                text-decoration: none;
            }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Bhavya Agro Exports</h1>
            <p>Admin Panel</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Enter</button>
            <div id="error-msg" class="error-msg">Incorrect username or password</div>
        </div>
    </div>

    <!-- MESSAGE OVERLAY -->
    <div id="msg-overlay">
        <div class="msg-box">
            <h3 id="msg-sender-name">Message</h3>
            <p id="msg-full-text"></p>
            <button onclick="closeMsg()">Close</button>
        </div>
    </div>

    <!-- INBOX PAGE -->
    <div id="inbox-page">
        <div class="header-section">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2>Inbox</h2>
                <div id="count-badge" class="count-badge">0 new inquiries</div>
            </div>
            <div onclick="location.reload()" style="font-size: 12px; color: var(--grey); cursor: pointer;">Log out</div>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>City</th>
                            <th>Phone</th>
                            <th>Message</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inbox-tbody">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, onSnapshot, query, orderBy, doc, updateDoc } from './js/firebase-config.js';

        // HARDCODED CREDENTIALS (for demonstration)
        const AUTH = {
            user: "omkar",
            pass: "bhavya123"
        };

        // LOGIN LOGIC
        const loginBtn = document.getElementById('login-btn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');
        const loginScreen = document.getElementById('login-screen');
        const inboxPage = document.getElementById('inbox-page');

        loginBtn.addEventListener('click', () => {
            if (usernameInput.value === AUTH.user && passwordInput.value === AUTH.pass) {
                loginScreen.style.display = 'none';
                inboxPage.style.display = 'block';
                initRealtimeInbox();
            } else {
                errorMsg.style.display = 'block';
            }
        });

        // Inbox Functionality
        let inquiries = [];

        function initRealtimeInbox() {
            const q = query(collection(db, "contacts"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                inquiries = snapshot.docs.map(d => ({
                    id: d.id,
                    ...d.data()
                }));
                renderTable();
            }, (error) => {
                console.error("Firestore Listen Error:", error);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('inbox-tbody');
            tbody.innerHTML = '';
            
            let newCount = 0;

            if (inquiries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--grey);">No inquiries found.</td></tr>';
                document.getElementById('count-badge').textContent = `0 new inquiries`;
                return;
            }

            inquiries.forEach(item => {
                const status = (item.status || 'new').toLowerCase();
                const isNew = status === "new";
                if (isNew) newCount++;

                const tr = document.createElement('tr');
                tr.className = isNew ? 'row-new' : 'row-done';
                
                // Format Date
                let dateStr = '---';
                if (item.timestamp) {
                    const d = item.timestamp.toDate ? item.timestamp.toDate() : new Date(item.timestamp);
                    dateStr = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                }

                tr.innerHTML = `
                    <td data-label="Name" style="font-weight: 700;">${item.name || 'Anonymous'}</td>
                    <td data-label="City">${item.city || '---'}</td>
                    <td data-label="Phone" style="font-family: 'DM Sans'; font-size: 13px;">${item.phone || '---'}</td>
                    <td data-label="Message" class="msg-cell">${item.message || 'No message'}</td>
                    <td data-label="Date" style="color: #888; font-size: 12px;">${dateStr}</td>
                    <td data-label="Status"><span class="status-tag ${isNew ? 'tag-new' : 'tag-done'}">${status.toUpperCase()}</span></td>
                    <td data-label="Action">
                        <button class="action-btn ${isNew ? 'btn-done' : 'btn-reopen'}" data-id="${item.id}" data-current="${status}">
                            ${isNew ? '✓' : '↩'}
                        </button>
                    </td>
                `;

                // Add click listener for status toggle
                tr.querySelector('.action-btn').onclick = () => toggleStatus(item.id, status);

                tbody.appendChild(tr);
            });

            document.getElementById('count-badge').textContent = `${newCount} new inquiries`;
        }

        async function toggleStatus(id, currentStatus) {
            const nextStatus = currentStatus === "new" ? "done" : "new";
            try {
                const docRef = doc(db, "contacts", id);
                await updateDoc(docRef, { status: nextStatus });
            } catch (err) {
                console.error("Error updating status:", err);
                alert("Failed to update status. Check console.");
            }
        }

        // Message Viewer
        window.viewMsg = function(name, text) {
            document.getElementById('msg-sender-name').textContent = "From: " + (name || 'Anonymous');
            document.getElementById('msg-full-text').textContent = text || 'No message content.';
            document.getElementById('msg-overlay').style.display = 'flex';
        }

        window.closeMsg = function() {
            document.getElementById('msg-overlay').style.display = 'none';
        }

        // Handle Escape key to close message
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMsg();
        });
    </script>
</body>
</html>
